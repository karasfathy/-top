<script>
    // ========================
    // الجزء التاسع: عدم تكرار الأسئلة + استيراد الأسئلة من الخارج
    // ========================

    // ==========================================
    // 1. نظام عدم تكرار الأسئلة
    // ==========================================
    
    // سجل الأسئلة التي تم عرضها لكل لاعب
    let questionsHistory = {
        global: [],      // جميع الأسئلة التي ظهرت في المسابقة (لمنع التكرار العام)
        perPlayer: {}    // الأسئلة التي رأها كل لاعب على حدة
    };
    
    // تهيئة سجل الأسئلة لكل لاعب
    function initQuestionsHistory() {
        questionsHistory = {
            global: [],
            perPlayer: {}
        };
        
        window.gameState.players.forEach(player => {
            questionsHistory.perPlayer[player] = [];
        });
    }
    
    // التحقق مما إذا كان السؤال قد تكرر (لنفس اللاعب أو عام)
    function isQuestionRepeated(questionId, playerName, checkGlobal = true) {
        // التحقق من السجل العام
        if(checkGlobal && questionsHistory.global.includes(questionId)) {
            return true;
        }
        
        // التحقق من سجل اللاعب الفردي
        if(questionsHistory.perPlayer[playerName] && questionsHistory.perPlayer[playerName].includes(questionId)) {
            return true;
        }
        
        return false;
    }
    
    // تسجيل سؤال كـ "تم عرضه"
    function markQuestionAsUsed(questionId, playerName) {
        // إضافة للسجل العام
        if(!questionsHistory.global.includes(questionId)) {
            questionsHistory.global.push(questionId);
        }
        
        // إضافة لسجل اللاعب
        if(questionsHistory.perPlayer[playerName]) {
            if(!questionsHistory.perPlayer[playerName].includes(questionId)) {
                questionsHistory.perPlayer[playerName].push(questionId);
            }
        }
    }
    
    // الحصول على سؤال جديد غير مكرر
    function getUniqueQuestion(questionPool, playerName, maxAttempts = 50) {
        let attempts = 0;
        let availableQuestions = [...questionPool];
        
        // تصفية الأسئلة التي لم يراها هذا اللاعب بعد
        let filteredQuestions = availableQuestions.filter(q => {
            const qId = getQuestionId(q);
            return !isQuestionRepeated(qId, playerName, true);
        });
        
        // إذا لم يتبق أسئلة جديدة، نعيد تعيين السجل العام (تبدأ دورة جديدة)
        if(filteredQuestions.length === 0 && questionsHistory.global.length > 0) {
            if(window.gameMessage) {
                window.gameMessage.innerHTML = "🔄 تم عرض جميع الأسئلة! بدء دورة جديدة من الأسئلة.";
            }
            // إعادة تعيين السجل العام فقط (يبقى سجل اللاعبين لتجنب التكرار القريب)
            questionsHistory.global = [];
            filteredQuestions = [...availableQuestions];
        }
        
        if(filteredQuestions.length === 0) {
            return null;
        }
        
        // اختيار سؤال عشوائي من المتاح
        const randomIndex = Math.floor(Math.random() * filteredQuestions.length);
        return filteredQuestions[randomIndex];
    }
    
    // إنشاء معرف فريد للسؤال
    function getQuestionId(question) {
        // استخدام نص السؤال كمعرف (يمكن تحسينه بإضافة hash)
        return question.text.trim().toLowerCase();
    }
    
    // تعديل دالة prepareQuestions لتدعم عدم التكرار
    const originalPrepareQuestions = prepareQuestions;
    window.prepareQuestions = function() {
        originalPrepareQuestions();
        initQuestionsHistory();
    };
    
    // تعديل دالة startNewRound لاستخدام الأسئلة غير المكررة
    const originalStartNewRoundForUniqueness = startNewRound;
    window.startNewRound = function() {
        if(window.gameState.gameFinished) return;
        if(window.gameState.isPaused) return;
        
        // التحقق من نهاية الأسئلة
        if(window.gameState.currentQuestionIndex >= window.gameState.currentQuestions.length) {
            endGame();
            return;
        }
        
        // اختيار لاعب عشوائي (قرعة)
        if(!currentSkipWaiting) {
            getRandomNextPlayer();
        }
        currentSkipWaiting = false;
        
        const currentPlayerName = window.gameState.players[window.gameState.currentPlayerIndex];
        
        // الحصول على سؤال غير مكرر لهذا اللاعب
        const uniqueQuestion = getUniqueQuestion(
            window.gameState.currentQuestions, 
            currentPlayerName,
            50
        );
        
        if(uniqueQuestion) {
            // تحديث السؤال الحالي
            window.gameState.currentQuestions[window.gameState.currentQuestionIndex] = uniqueQuestion;
            const qId = getQuestionId(uniqueQuestion);
            markQuestionAsUsed(qId, currentPlayerName);
        }
        
        // متابعة العرض كالمعتاد
        const currentQuestion = window.gameState.currentQuestions[window.gameState.currentQuestionIndex];
        
        // تحديث واجهة العرض
        if(window.currentPlayerNameSpan) {
            window.currentPlayerNameSpan.innerText = currentPlayerName;
        }
        
        if(window.questionText) {
            let questionHtml = currentQuestion.text;
            if(currentQuestion.gold) {
                questionHtml = '💎✨ ' + questionHtml + ' ✨💎';
                window.gameState.goldenQuestionActive = true;
            } else {
                window.gameState.goldenQuestionActive = false;
            }
            window.questionText.innerHTML = questionHtml;
        }
        
        if(window.questionDisplay) {
            window.questionDisplay.innerText = `السؤال ${window.gameState.currentQuestionIndex + 1}/${window.gameState.currentQuestions.length}`;
        }
        
        if(window.roundDisplay) {
            window.roundDisplay.innerText = `الدور #${window.gameState.roundNumber}`;
        }
        
        // عرض الخيارات
        displayOptions(currentQuestion.options);
        
        // تحديث لوحة المتصدرين
        updateScoreboardDisplay();
        
        // بدء المؤقت
        window.gameState.waitingForAnswer = true;
        startTimer();
        
        // حفظ الحالة
        saveGameStateToLocal();
    };
    
    // ==========================================
    // 2. استيراد الأسئلة من الخارج (ملف أو رابط)
    // ==========================================
    
    // تخزين الأسئلة الإضافية
    let externalQuestions = [];
    
    // إضافة زر استيراد الأسئلة في واجهة الإعدادات
    function addExternalQuestionsButton() {
        const settingsCard = document.querySelector('.two-columns .card:last-child');
        if(settingsCard && !document.getElementById('externalQuestionsSection')) {
            const externalSection = document.createElement('div');
            externalSection.id = 'externalQuestionsSection';
            externalSection.style.marginTop = '20px';
            externalSection.style.padding = '15px';
            externalSection.style.background = 'rgba(0,0,0,0.2)';
            externalSection.style.borderRadius = '28px';
            externalSection.innerHTML = `
                <h3 style="font-size: 1rem; margin-bottom: 10px;">📤 استيراد أسئلة من الخارج</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <label for="externalFileInput" style="background: #4b5563; padding: 10px 18px; border-radius: 60px; cursor: pointer;">📂 رفع ملف JSON</label>
                    <input type="file" id="externalFileInput" accept=".json" style="display:none;">
                    <input type="text" id="externalUrlInput" class="input-style" placeholder="أو رابط API/JSON" style="flex:2;">
                    <button id="fetchQuestionsBtn" style="background: #10b981;">🌐 تحميل من الرابط</button>
                </div>
                <div id="externalQuestionsStatus" class="message-area" style="margin-top: 10px; font-size: 0.8rem;">💡 يمكنك إضافة أسئلتك الخاصة عبر ملف JSON</div>
            `;
            settingsCard.appendChild(externalSection);
            
            // ربط الأحداث
            document.getElementById('externalFileInput')?.addEventListener('change', handleExternalFileUpload);
            document.getElementById('fetchQuestionsBtn')?.addEventListener('click', fetchQuestionsFromUrl);
        }
    }
    
    // معالجة رفع ملف JSON
    function handleExternalFileUpload(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const questions = JSON.parse(ev.target.result);
                if(Array.isArray(questions)) {
                    addExternalQuestions(questions);
                } else if(questions.questions && Array.isArray(questions.questions)) {
                    addExternalQuestions(questions.questions);
                } else {
                    throw new Error("تنسيق غير صحيح");
                }
            } catch(err) {
                showExternalStatus("❌ خطأ في قراءة الملف: تأكد من صيغة JSON", 'error');
            }
        };
        reader.readAsText(file, 'UTF-8');
        e.target.value = '';
    }
    
    // جلب الأسئلة من رابط
    async function fetchQuestionsFromUrl() {
        const urlInput = document.getElementById('externalUrlInput');
        const url = urlInput?.value.trim();
        if(!url) {
            showExternalStatus("⚠️ الرجاء إدخال رابط صحيح", 'error');
            return;
        }
        
        showExternalStatus("⏳ جاري تحميل الأسئلة...", 'info');
        
        try {
            const response = await fetch(url);
            if(!response.ok) throw new Error("فشل التحميل");
            const data = await response.json();
            
            let questions = [];
            if(Array.isArray(data)) {
                questions = data;
            } else if(data.questions && Array.isArray(data.questions)) {
                questions = data.questions;
            } else {
                throw new Error("تنسيق غير صحيح");
            }
            
            addExternalQuestions(questions);
        } catch(err) {
            showExternalStatus(`❌ خطأ في التحميل: ${err.message}`, 'error');
        }
    }
    
    // إضافة الأسئلة الخارجية إلى المكتبة
    function addExternalQuestions(questions) {
        let addedCount = 0;
        
        questions.forEach(q => {
            if(q.text && q.options && Array.isArray(q.options) && typeof q.correct !== 'undefined') {
                // التحقق من صحة السؤال
                const formattedQuestion = {
                    text: q.text,
                    options: q.options.slice(0, 4),
                    correct: parseInt(q.correct) || 0,
                    difficulty: q.difficulty || 1,
                    gold: q.gold || false,
                    external: true
                };
                
                // إضافة إلى المكتبة المناسبة حسب النوع
                const targetType = q.type || 'mixed';
                if(window.questionsLibrary[targetType]) {
                    window.questionsLibrary[targetType].push(formattedQuestion);
                } else {
                    window.questionsLibrary.mixed.push(formattedQuestion);
                }
                
                externalQuestions.push(formattedQuestion);
                addedCount++;
            }
        });
        
        showExternalStatus(`✅ تمت إضافة ${addedCount} سؤال جديد إلى مكتبة الأسئلة!`, 'success');
        
        // تحديث عدد الأسئلة في الواجهة
        updateTotalQuestionsCount();
    }
    
    // عرض حالة الاستيراد
    function showExternalStatus(msg, type) {
        const statusDiv = document.getElementById('externalQuestionsStatus');
        if(statusDiv) {
            statusDiv.innerHTML = msg;
            statusDiv.style.background = type === 'error' ? '#dc262630' : (type === 'success' ? '#10b98130' : '#3b82f630');
            setTimeout(() => {
                if(statusDiv.innerHTML === msg) {
                    statusDiv.innerHTML = '💡 يمكنك إضافة أسئلتك الخاصة عبر ملف JSON';
                    statusDiv.style.background = '';
                }
            }, 4000);
        }
    }
    
    // تحديث عدد الأسئلة المعروض
    function updateTotalQuestionsCount() {

<script>
    // ========================
    // الجزء الحادي عشر المعدل: حفظ الأسئلة نهائياً ومشاركتها بين الأجهزة
    // ========================

    const MASTER_QUESTIONS_KEY = 'orthodox_master_questions_library';

    // 1. دالة الحفظ على السيرفر
    async function saveMasterQuestionsLibrary() {
        // تجهيز البيانات
        const libraryToSave = {};
        for (let type in window.questionsLibrary) {
            if (window.questionsLibrary[type] && Array.isArray(window.questionsLibrary[type])) {
                libraryToSave[type] = window.questionsLibrary[type];
            }
        }

        // محاولة الحفظ على السيرفر
        try {
            const response = await fetch('save_questions.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ questions: libraryToSave })
            });
            const result = await response.json();
            if (result.success) {
                console.log("💾 تم حفظ المكتبة على السيرفر بنجاح");
            } else {
                console.log("⚠️ فشل الحفظ على السيرفر");
            }
        } catch (error) {
            console.error("❌ خطأ في الاتصال بالسيرفر:", error);
            // حفظ احتياطي محلي في حالة عدم وجود اتصال
            localStorage.setItem(MASTER_QUESTIONS_KEY, JSON.stringify(libraryToSave));
        }
    }

    // 2. دالة التحميل من السيرفر
    async function loadMasterQuestionsLibrary() {
        try {
            const response = await fetch('save_questions.php');
            const serverData = await response.json();
            
            // إذا وجدت بيانات على السيرفر
            if (serverData && Object.keys(serverData).length > 0) {
                for (let type in serverData) {
                    if (window.questionsLibrary[type] && Array.isArray(serverData[type])) {
                        serverData[type].forEach(newQuestion => {
                            // التحقق من عدم التكرار قبل الإضافة
                            const exists = window.questionsLibrary[type].some(existing => existing.text === newQuestion.text);
                            if (!exists) {
                                window.questionsLibrary[type].push(newQuestion);
                            }
                        });
                    }
                }
                console.log("📚 تم تحميل المكتبة من السيرفر");
                updateQuestionStats(); // تحديث الإحصائيات بعد التحميل
                return true;
            }
        } catch (error) {
            console.log("⚠️ فشل الاتصال بالسيرفر، استخدام النسخة المحلية");
            // الرجوع إلى localStorage
            const saved = localStorage.getItem(MASTER_QUESTIONS_KEY);
            if (saved) {
                const masterLibrary = JSON.parse(saved);
                for (let type in masterLibrary) {
                    if (window.questionsLibrary[type] && Array.isArray(masterLibrary[type])) {
                        masterLibrary[type].forEach(newQuestion => {
                            const exists = window.questionsLibrary[type].some(existing => existing.text === newQuestion.text);
                            if (!exists) {
                                window.questionsLibrary[type].push(newQuestion);
                            }
                        });
                    }
                }
                console.log("📚 تم تحميل المكتبة من localStorage");
                return true;
            }
        }
        return false;
    }

    // 3. دالة الإضافة (تضيف وتحفظ على السيرفر فوراً)
    function addQuestionPermanently(question, category = 'mixed') {
        if (!question.text || !question.options || question.options.length !== 4) return false;
        
        const targetCategory = window.questionsLibrary[category] || window.questionsLibrary.mixed;
        const exists = targetCategory.some(existing => existing.text === question.text);
        if (exists) return false;
        
        question.addedBy = 'user';
        question.dateAdded = new Date().toISOString();
        targetCategory.push(question);
        
        if (category !== 'mixed') {
            window.questionsLibrary.mixed.push({ ...question, source: category });
        }
        
        saveMasterQuestionsLibrary(); // حفظ فوري على السيرفر
        updateQuestionStats();
        return true;
    }

    // 4. إحصائيات الأسئلة
    function updateQuestionStats() {
        let total = 0;
        for (let type in window.questionsLibrary) {
            if (Array.isArray(window.questionsLibrary[type])) total += window.questionsLibrary[type].length;
        }
        const statsDiv = document.getElementById('questionStatsDisplay');
        if (statsDiv) statsDiv.innerHTML = `📚 إجمالي الأسئلة: ${total} سؤال`;
        return total;
    }

    // 5. واجهة الإحصائيات
    function addQuestionStatsDisplay() {
        const card = document.querySelector('.two-columns .card:last-child');
        if (card && !document.getElementById('questionStatsDisplay')) {
            const div = document.createElement('div');
            div.id = 'questionStatsDisplay';
            div.style.cssText = 'margin-top:15px; padding:10px; background:rgba(0,0,0,0.2); border-radius:28px; text-align:center;';
            card.appendChild(div);
            updateQuestionStats();
        }
    }

    // 6. تصدير المكتبة كملف JSON
    function exportFullLibrary() {
        const data = {};
        for (let type in window.questionsLibrary) {
            if (Array.isArray(window.questionsLibrary[type])) data[type] = window.questionsLibrary[type];
        }
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `questions_${Date.now()}.json`;
        link.click();
    }

    // 7. استيراد مكتبة من ملف
    function importFullLibrary(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                let added = 0;
                for (let type in data) {
                    if (window.questionsLibrary[type] && Array.isArray(data[type])) {
                        data[type].forEach(q => {
                            if (!window.questionsLibrary[type].some(ex => ex.text === q.text)) {
                                window.questionsLibrary[type].push(q);
                                added++;
                            }
                        });
                    }
                }
                if (added > 0) {
                    saveMasterQuestionsLibrary();
                    alert(`✅ تمت إضافة ${added} سؤال`);
                    updateQuestionStats();
                } else {
                    alert("⚠️ لا توجد أسئلة جديدة");
                }
            } catch (err) {
                alert("❌ خطأ: " + err.message);
            }
        };
        reader.readAsText(file);
    }

    // 8. إضافة أزرار الإدارة في الواجهة
    function addLibraryManagementButtons() {
        const card = document.querySelector('.two-columns .card:last-child');
        if (!card || document.getElementById('libraryManagementSection')) return;
        const section = document.createElement('div');
        section.id = 'libraryManagementSection';
        section.style.cssText = 'margin-top:20px; padding:15px; background:rgba(0,0,0,0.2); border-radius:28px;';
        section.innerHTML = `
            <h3 style="margin-bottom:10px;">📚 إدارة المكتبة</h3>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button id="exportLibBtn" style="background:#10b981;">📤 تصدير</button>
                <label for="importLibInput" style="background:#3b82f6; padding:10px 20px; border-radius:60px; cursor:pointer;">📥 استيراد</label>
                <input type="file" id="importLibInput" accept=".json" style="display:none;">
            </div>
        `;
        card.appendChild(section);
        document.getElementById('exportLibBtn')?.addEventListener('click', exportFullLibrary);
        document.getElementById('importLibInput')?.addEventListener('change', e => {
            if (e.target.files[0]) importFullLibrary(e.target.files[0]);
            e.target.value = '';
        });
    }

    // 9. التهيئة الرئيسية
    async function initPermanentStorage() {
        await loadMasterQuestionsLibrary();
        addQuestionStatsDisplay();
        addLibraryManagementButtons();
    }

    // بدء التشغيل
    initPermanentStorage();
    console.log("الجزء الحادي عشر المعدل يعمل - الآن الأسئلة تُحفظ على السيرفر");
</script>
